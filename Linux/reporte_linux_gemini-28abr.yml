---
- name: Reporte de Salud del Sistema (RHEL)
  hosts: all
  become: true
  gather_facts: yes  # Asegura que recolectamos info de RAM y Disco
  vars:
    servicio_a_validar: "sshd"

  tasks:
    - name: Obtener información del servicio
      # Usamos el nombre corto para mejorar compatibilidad
      systemd:
        name: "{{ servicio_a_validar }}"
      register: service_status

    - name: Generar Reporte Formateado
      ansible.builtin.debug:
        msg: |
          ============================================================
          REPORTE DE ESTADO: {{ ansible_hostname | upper }}
          ============================================================
          
          ESTADO DEL SERVICIO ({{ servicio_a_validar }}):
          ------------------------------------------------------------
          Estado:    {{ service_status.status.ActiveState | default('desconocido') }}
          SubEstado: {{ service_status.status.SubState | default('desconocido') }}
          
          MEMORIA RAM:
          ------------------------------------------------------------
          Total:     {{ (ansible_memtotal_mb / 1024) | round(2) }} GB
          Libre:     {{ (ansible_memfree_mb / 1024) | round(2) }} GB
          
          ALMACENAMIENTO (Partición Raíz):
          ------------------------------------------------------------
          Punto de Montaje: /
          Tamaño Total:     {{ (ansible_mounts | selectattr('mount', 'equalto', '/') | list | first).size_total | human_readable }}
          Espacio Libre:    {{ (ansible_mounts | selectattr('mount', 'equalto', '/') | list | first).size_available | human_readable }}
          
          ============================================================