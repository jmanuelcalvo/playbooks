---
- name: Generar Reporte de AWS en Servidor Dedicado
  hosts: all # O los nombres de tus servidores remotos
  become: true
  gather_facts: true

  # ESTA ES LA MAGIA: Pasamos las llaves de AWS desde AAP a la máquina remota
  environment:
    AWS_ACCESS_KEY_ID: "{{ lookup('env', 'AWS_ACCESS_KEY_ID') }}"
    AWS_SECRET_ACCESS_KEY: "{{ lookup('env', 'AWS_SECRET_ACCESS_KEY') }}"
    AWS_REGION: "us-east-1" 

  tasks:
    - name: 1. Asegurar que pip está instalado (Requisito para hablar con AWS)
      ansible.builtin.package:
        name: python3-pip
        state: present

    - name: 2. Instalar librerías de Python para AWS (boto3)
      ansible.builtin.pip:
        name: 
          - boto3
          - botocore
        state: present

    - name: 3. Ejecutar el rol de reporte de AWS de Shadowman
      ansible.builtin.include_role:
        name: shadowman.reports.build_report_aws
