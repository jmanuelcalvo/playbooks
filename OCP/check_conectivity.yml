---
- name: Validar conectividad desde AAP usando Credenciales
  hosts: localhost
  connection: local
  gather_facts: false

  tasks:
    - name: Consultar el endpoint de usuario (Whoami)
      ansible.builtin.uri:
        # AAP inyecta K8S_AUTH_HOST. Añadimos el path del API de usuario.
        url: "{{ lookup('ansible.builtin.env', 'K8S_AUTH_HOST') }}/apis/user.openshift.io/v1/users/~"
        method: GET
        headers:
          Authorization: "Bearer {{ lookup('ansible.builtin.env', 'K8S_AUTH_API_KEY') }}"
        # Tomamos la preferencia de SSL de la credencial o desactivamos por seguridad
        validate_certs: "{{ lookup('ansible.builtin.env', 'K8S_AUTH_VERIFY_SSL') | default(false, true) }}"
        status_code: 200
      register: ocp_response
      ignore_errors: true

    - name: Resultado de la validación
      ansible.builtin.debug:
        msg: 
          - "Conectividad: EXITOSA"
          - "Usuario en OpenShift: {{ ocp_response.json.metadata.name }}"
          - "URL conectada: {{ lookup('ansible.builtin.env', 'K8S_AUTH_HOST') }}"
      when: ocp_response.status == 200

    - name: Fallo de conectividad o configuración
      ansible.builtin.fail:
        msg: "No se pudo conectar. Verifica que la credencial esté asociada al Job Template en AAP."
      when: ocp_response.status != 200
