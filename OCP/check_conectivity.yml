---
- name: Validar conectividad con OpenShift
  hosts: localhost
  connection: local
  gather_facts: false

  tasks:
    - name: Consultar mis propios permisos (SelfSubjectRulesReview)
      kubernetes.core.k8s_info:
        api_version: authorization.openshift.io/v1
        kind: SelfSubjectRulesReview
      register: ocp_connection
      ignore_errors: true

    - name: Verificar si la conexión fue exitosa
      ansible.builtin.debug:
        msg: "¡Conexión exitosa! El clúster reconoce al usuario jcalvo."
      when: ocp_connection.resources is defined or ocp_connection.status is defined

    - name: Reportar error de conectividad
      ansible.builtin.fail:
        msg: "Error de red o autenticación."
      when: ocp_connection.resources is not defined and ocp_connection.status is not defined
