---
- name: Generate deployment report
  hosts: localhost
  gather_facts: false

  vars:
    ocp_namespace: "{{ project_name }}"
    application: "{{ app_name | default('app01') }}"

  tasks:

    - name: Get application route
      kubernetes.core.k8s_info:
        api_version: route.openshift.io/v1
        kind: Route
        namespace: "{{ ocp_namespace }}"
        name: "{{ application }}"
      register: route_info

    - name: Build application URL
      ansible.builtin.set_fact:
        route_url: "http://{{ route_info.resources[0].spec.host }}"
      when: route_info.resources | length > 0

    - name: Get pods for application
      kubernetes.core.k8s_info:
        api_version: v1
        kind: Pod
        namespace: "{{ ocp_namespace }}"
        label_selectors:
          - app={{ application }}
      register: pods_info

    - name: Determine pod status
      ansible.builtin.set_fact:
        pod_status: "{{ pods_info.resources[0].status.phase if pods_info.resources | length > 0 else 'UNKNOWN' }}"

    - name: Run smoke test
      ansible.builtin.uri:
        url: "{{ route_url }}"
        method: GET
        status_code: 200
      register: smoke_result
      ignore_errors: true
      when: route_url is defined

    - name: Determine smoke status
      ansible.builtin.set_fact:
        smoke_status: "{{ 'SUCCESS' if smoke_result.status == 200 else 'FAILED' }}"
      when: route_url is defined

    - name: Display deployment report
      ansible.builtin.debug:
        msg: |
          ==================================================
                    APPLICATION DEPLOYMENT REPORT
          ==================================================

          Application : {{ application }}
          Namespace   : {{ ocp_namespace }}

          Route URL   : {{ route_url | default('Not Found') }}

          Pod Status  : {{ pod_status }}

          Smoke Test  : {{ smoke_status | default('NOT EXECUTED') }}

          Pods Found  : {{ pods_info.resources | length }}

          ==================================================
