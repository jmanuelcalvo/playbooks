---
- name: OpenShift Namespace Analysis
  hosts: openshift_namespaces
  gather_facts: false
  connection: local

  vars:
    ocp_namespace: "{{ inventory_hostname }}"

  tasks:

    - name: Get Pods
      kubernetes.core.k8s_info:
        kind: Pod
        namespace: "{{ ocp_namespace }}"
      register: pods_info

    - name: Get Deployments
      kubernetes.core.k8s_info:
        kind: Deployment
        namespace: "{{ ocp_namespace }}"
      register: deployments_info

    - name: Get Services
      kubernetes.core.k8s_info:
        kind: Service
        namespace: "{{ ocp_namespace }}"
      register: services_info

    - name: Calculate health metrics
      set_fact:
        total_pods: "{{ pods_info.resources | length }}"
        running_pods: "{{ pods_info.resources | selectattr('status.phase','equalto','Running') | list | length }}"
        failed_pods: "{{ total_pods | int - running_pods | int }}"

    - name: Define namespace status
      set_fact:
        namespace_status: "{{ '🟢 Healthy' if failed_pods|int == 0 else '🔴 Issues' }}"

    - name: Build namespace summary
      set_fact:
        namespace_summary: |
          {{ namespace_status }} **{{ ocp_namespace }}**
          Pods: {{ running_pods }}/{{ total_pods }} | Deployments: {{ deployments_info.resources | length }} | Services: {{ services_info.resources | length }}

# ==========================================================
# 🔥 CONSOLIDACIÓN
# ==========================================================

- name: Consolidated Report
  hosts: localhost
  gather_facts: false

  vars:
    group_name: "openshift_namespaces"

  tasks:

    - name: Build consolidated message
      set_fact:
        final_message: |
          ## 🚀 OpenShift Cluster Summary

          {% for host in groups[group_name] %}
          {{ hostvars[host].namespace_summary }}
          {% endfor %}

          ---
          🧠 Generated by Ansible Automation Platform

    - name: Show consolidated report
      debug:
        msg: "{{ final_message }}"

    - name: Send to Mattermost
      uri:
        url: "{{ mattermost_webhook_url }}"
        method: POST
        body_format: json
        body:
          text: "{{ final_message }}"
        headers:
          Content-Type: "application/json"
      when: mattermost_webhook_url is defined
