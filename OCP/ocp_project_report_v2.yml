---
- name: OpenShift Namespace Analysis
  hosts: openshift_namespaces
  gather_facts: false
  connection: local

  vars:
    ocp_namespace: "{{ inventory_hostname }}"

  tasks:

    - name: Get Pods
      kubernetes.core.k8s_info:
        kind: Pod
        namespace: "{{ ocp_namespace }}"
      register: pods_info
      failed_when: false

    - name: Get Deployments
      kubernetes.core.k8s_info:
        kind: Deployment
        namespace: "{{ ocp_namespace }}"
      register: deployments_info
      failed_when: false

    - name: Get Services
      kubernetes.core.k8s_info:
        kind: Service
        namespace: "{{ ocp_namespace }}"
      register: services_info
      failed_when: false

    - name: Calculate pod metrics
      set_fact:
        total_pods: "{{ pods_info.resources | length if pods_info.resources is defined else 0 }}"
        running_pods: >-
          {{
            pods_info.resources
            | selectattr('status.phase','equalto','Running')
            | list | length
            if pods_info.resources is defined else 0
          }}

    - name: Calculate failed pods
      set_fact:
        failed_pods: "{{ total_pods | int - running_pods | int }}"

    - name: Normalize counts
      set_fact:
        deployment_count: "{{ deployments_info.resources | length if deployments_info.resources is defined else 'N/A' }}"
        service_count: "{{ services_info.resources | length if services_info.resources is defined else 'N/A' }}"

    - name: Define namespace status
      set_fact:
        namespace_status: >-
          {% if failed_pods|int > 0 %}
          🔴 Issues
          {% elif deployment_count == 'N/A' %}
          🟡 Limited Access
          {% else %}
          🟢 Healthy
          {% endif %}

    - name: Build namespace summary
      set_fact:
        namespace_summary: |
          {{ namespace_status }} **{{ ocp_namespace }}**
          Pods: {{ running_pods }}/{{ total_pods }} | Deployments: {{ deployment_count }} | Services: {{ service_count }}

# ==========================================================
# 🔥 CONSOLIDACIÓN
# ==========================================================

- name: Consolidated OpenShift Report
  hosts: localhost
  gather_facts: false

  vars:
    group_name: "openshift_namespaces"

  tasks:

    - name: Build consolidated report
      set_fact:
        final_message: |
          ## 🚀 OpenShift Cluster Summary

          {% for host in groups[group_name] %}
          {{ hostvars[host].namespace_summary | default('No data') }}
          {% endfor %}

          ---
          🧠 Generated by Ansible Automation Platform

    - name: Show consolidated report
      debug:
        msg: "{{ final_message }}"

    - name: Send to Mattermost
      uri:
        url: "{{ mattermost_webhook_url }}"
        method: POST
        body_format: json
        body:
          text: "{{ final_message }}"
        headers:
          Content-Type: "application/json"
      when: mattermost_webhook_url is defined
