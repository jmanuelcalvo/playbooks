---
- name: OpenShift Namespace Analysis
  hosts: openshift_namespaces
  gather_facts: false
  connection: local

  vars:
    ocp_namespace: "{{ inventory_hostname }}"

  tasks:

    - name: Get Pods
      kubernetes.core.k8s_info:
        kind: Pod
        namespace: "{{ ocp_namespace }}"
      register: pods_info
      failed_when: false

    - name: Get Deployments
      kubernetes.core.k8s_info:
        kind: Deployment
        namespace: "{{ ocp_namespace }}"
      register: deployments_info
      failed_when: false

    - name: Get Services
      kubernetes.core.k8s_info:
        kind: Service
        namespace: "{{ ocp_namespace }}"
      register: services_info
      failed_when: false

    - name: Get Routes
      kubernetes.core.k8s_info:
        api_version: route.openshift.io/v1
        kind: Route
        namespace: "{{ ocp_namespace }}"
      register: routes_info
      failed_when: false

    - name: Get PVCs
      kubernetes.core.k8s_info:
        kind: PersistentVolumeClaim
        namespace: "{{ ocp_namespace }}"
      register: pvc_info
      failed_when: false

    - name: Get PVs (cluster-level)
      kubernetes.core.k8s_info:
        kind: PersistentVolume
      register: pv_info
      failed_when: false

    - name: Get ConfigMaps
      kubernetes.core.k8s_info:
        kind: ConfigMap
        namespace: "{{ ocp_namespace }}"
      register: configmaps_info
      failed_when: false

    - name: Get Secrets
      kubernetes.core.k8s_info:
        kind: Secret
        namespace: "{{ ocp_namespace }}"
      register: secrets_info
      failed_when: false

    # =========================
    # 📊 MÉTRICAS
    # =========================

    - name: Calculate pod metrics
      set_fact:
        total_pods: "{{ pods_info.resources | length if pods_info.resources is defined else 0 }}"
        running_pods: >-
          {{
            pods_info.resources
            | selectattr('status.phase','equalto','Running')
            | list | length
            if pods_info.resources is defined else 0
          }}

    - name: Calculate failed pods
      set_fact:
        failed_pods: "{{ total_pods | int - running_pods | int }}"

    - name: Normalize counts
      set_fact:
        deployment_count: "{{ deployments_info.resources | length if deployments_info.resources is defined else 'N/A' }}"
        service_count: "{{ services_info.resources | length if services_info.resources is defined else 'N/A' }}"
        route_count: "{{ routes_info.resources | length if routes_info.resources is defined else 'N/A' }}"
        pvc_count: "{{ pvc_info.resources | length if pvc_info.resources is defined else 'N/A' }}"
        pv_count: "{{ pv_info.resources | length if pv_info.resources is defined else 'N/A' }}"
        configmap_count: "{{ configmaps_info.resources | length if configmaps_info.resources is defined else 'N/A' }}"
        secret_count: "{{ secrets_info.resources | length if secrets_info.resources is defined else 'N/A' }}"

    - name: Define namespace status
      set_fact:
        namespace_status: >-
          {% if failed_pods|int > 0 %}
          🔴 Issues
          {% elif deployment_count == 'N/A' %}
          🟡 Limited Access
          {% else %}
          🟢 Healthy
          {% endif %}

    - name: Build namespace summary
      set_fact:
        namespace_summary: |
          {{ namespace_status }} **{{ ocp_namespace }}**

          Pods: {{ running_pods }}/{{ total_pods }}
          Deployments: {{ deployment_count }} | Services: {{ service_count }}
          Routes: {{ route_count }} | PVCs: {{ pvc_count }} | PVs: {{ pv_count }}
          ConfigMaps: {{ configmap_count }} | Secrets: {{ secret_count }}

# ==========================================================
# 🔥 CONSOLIDACIÓN
# ==========================================================

- name: Consolidated OpenShift Report
  hosts: localhost
  gather_facts: false

  vars:
    group_name: "openshift_namespaces"

  tasks:

    - name: Build consolidated report
      set_fact:
        final_message: |
          ## 🚀 OpenShift Cluster Summary

          {% for host in groups[group_name] %}
          {{ hostvars[host].namespace_summary | default('No data') }}
          {% endfor %}

          ---
          🧠 Generated by Ansible Automation Platform

    - name: Show consolidated report
      debug:
        msg: "{{ final_message }}"

    - name: Send to Mattermost
      uri:
        url: "{{ mattermost_webhook_url }}"
        method: POST
        body_format: json
        body:
          text: "{{ final_message }}"
        headers:
          Content-Type: "application/json"
      when: mattermost_webhook_url is defined
