---
- name: Consolidar datos de todos los namespaces
  ansible.builtin.set_fact:
    ocp_full_report: >-
      {{
        groups['ns_targets']
        | map('extract', hostvars, 'ns_data')
        | select('defined')
        | list
      }}

- name: Generar reporte HTML
  ansible.builtin.template:
    src: report.html.j2
    dest: "{{ ocp_report_html_path }}"
    mode: '0644'

- name: Generar reporte CSV
  ansible.builtin.template:
    src: report.csv.j2
    dest: "{{ ocp_report_csv_path }}"
    mode: '0644'

- name: Leer contenido del HTML para exportar a AAP
  ansible.builtin.slurp:
    src: "{{ ocp_report_html_path }}"
  register: html_content_encoded

- name: Verificar si el host remoto está en el inventario
  ansible.builtin.set_fact:
    remote_host_exists: "{{ ocp_remote_report_host in groups['all'] }}"

- name: Copiar reporte HTML al host remoto {{ ocp_remote_report_host }}
  ansible.builtin.copy:
    content: "{{ html_global }}"
    dest: "/tmp/{{ ocp_report_html_path | basename }}"
    mode: '0644'
  delegate_to: "{{ ocp_remote_report_host }}"
  when: remote_host_exists
  ignore_unreachable: true

- name: Generar contenido CSV para exportación
  ansible.builtin.set_fact:
    csv_global: "{{ lookup('template', 'report.csv.j2') }}"

- name: Copiar reporte CSV al host remoto {{ ocp_remote_report_host }}
  ansible.builtin.copy:
    content: "{{ csv_global }}"
    dest: "/tmp/{{ ocp_report_csv_path | basename }}"
    mode: '0644'
  delegate_to: "{{ ocp_remote_report_host }}"
  when: remote_host_exists
  ignore_unreachable: true

- name: Aviso si no se pudo exportar al host remoto
  ansible.builtin.debug:
    msg: "AVISO: El host {{ ocp_remote_report_host }} no está en el inventario o no es alcanzable. El reporte solo estará disponible en los Artifacts de AAP."
  when: not remote_host_exists

- name: Publicar resultados en AAP (Artifacts)
  ansible.builtin.set_stats:
    data:
      reporte_html_raw: "{{ html_content_encoded.content | b64decode }}"
      archivo_html_generado: "{{ ocp_report_html_path | basename }}"
      archivo_csv_generado: "{{ ocp_report_csv_path | basename }}"
      timestamp: "{{ ocp_timestamp }}"
