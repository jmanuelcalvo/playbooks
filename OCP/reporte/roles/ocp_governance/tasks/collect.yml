---
- name: Obtener metadatos del namespace {{ inventory_hostname }}
  kubernetes.core.k8s_info:
    api_version: v1
    kind: Namespace
    name: "{{ inventory_hostname }}"
    host: "{{ k8s_auth.host | default(omit) }}"
    api_key: "{{ k8s_auth.api_key | default(omit) }}"
    ca_cert: "{{ k8s_auth.ca_cert | default(omit) }}"
    validate_certs: "{{ k8s_auth.validate_certs }}"
    kubeconfig: "{{ k8s_auth.kubeconfig | default(omit) }}"
  register: ns_meta

- name: Extraer etiquetas y anotaciones de gobernanza
  ansible.builtin.set_fact:
    ns_metadata:
      labels: "{{ ns_meta.resources[0].metadata.labels | default({}) }}"
      annotations: "{{ ns_meta.resources[0].metadata.annotations | default({}) }}"
  when: ns_meta.resources | length > 0

- name: Obtener inventario de recursos en {{ inventory_hostname }}
  kubernetes.core.k8s_info:
    api_version: "{{ item.api_version }}"
    kind: "{{ item.kind }}"
    namespace: "{{ inventory_hostname }}"
    host: "{{ k8s_auth.host | default(omit) }}"
    api_key: "{{ k8s_auth.api_key | default(omit) }}"
    ca_cert: "{{ k8s_auth.ca_cert | default(omit) }}"
    validate_certs: "{{ k8s_auth.validate_certs }}"
    kubeconfig: "{{ k8s_auth.kubeconfig | default(omit) }}"
  loop: "{{ ocp_resources_to_query }}"
  register: resources_info
  when: ns_meta.resources | length > 0

- name: Estructurar datos para el reporte
  ansible.builtin.set_fact:
    ns_data:
      namespace: "{{ inventory_hostname }}"
      gov:
        criticidad: "{{ ns_metadata.labels.criticidad | default('') }}"
        dt_owner: "{{ ns_metadata.labels['dt.owner'] | default('') }}"
        node_selector: "{{ ns_metadata.annotations['openshift.io/node-selector'] | default('') }}"
      missing:
        criticidad: "{{ ns_metadata.labels.criticidad is not defined or ns_metadata.labels.criticidad | length == 0 }}"
        dt_owner: "{{ ns_metadata.labels['dt.owner'] is not defined or ns_metadata.labels['dt.owner'] | length == 0 }}"
        node_selector: "{{ ns_metadata.annotations['openshift.io/node-selector'] is not defined or ns_metadata.annotations['openshift.io/node-selector'] | length == 0 }}"
      resumen: >-
        {{
          resources_info.results | default([])
          | map(attribute='item.label', start_tag='recurso')
          | zip(resources_info.results | default([]) | map(attribute='resources', default=[]) | map('length'))
          | map('zip', ['recurso', 'cantidad'])
          | map('map', 'reverse')
          | map('dict')
          | list
        }}
  # La expresión de resumen arriba es un poco compleja para legibilidad, 
  # pero más eficiente que un loop de set_fact. 
  # Vamos a simplificarla para que sea mantenible.
  when: ns_meta.resources | length > 0

- name: Simplificar resumen de recursos (alternativa legible)
  ansible.builtin.set_fact:
    ns_summary: []

- name: Construir resumen de recursos
  ansible.builtin.set_fact:
    ns_summary: "{{ ns_summary + [{'recurso': item.item.label, 'cantidad': item.resources | length}] }}"
  loop: "{{ resources_info.results | default([]) }}"
  when: ns_meta.resources | length > 0 and item.resources is defined

- name: Guardar datos finales del namespace
  ansible.builtin.set_fact:
    ns_data:
      namespace: "{{ inventory_hostname }}"
      gov:
        criticidad: "{{ ns_metadata.labels.criticidad | default('') }}"
        dt_owner: "{{ ns_metadata.labels['dt.owner'] | default('') }}"
        node_selector: "{{ ns_metadata.annotations['openshift.io/node-selector'] | default('') }}"
      missing:
        criticidad: "{{ ns_metadata.labels.criticidad is not defined or ns_metadata.labels.criticidad | length == 0 }}"
        dt_owner: "{{ ns_metadata.labels['dt.owner'] is not defined or ns_metadata.labels['dt.owner'] | length == 0 }}"
        node_selector: "{{ ns_metadata.annotations['openshift.io/node-selector'] is not defined or ns_metadata.annotations['openshift.io/node-selector'] | length == 0 }}"
      resumen: "{{ ns_summary }}"
  when: ns_meta.resources | length > 0
