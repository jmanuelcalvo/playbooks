---
- name: Bootstrap OpenShift Project
  hosts: localhost
  gather_facts: false

  collections:
    - redhat.openshift

  vars:

    ocp_project_name: "{{ project_name }}"
    ocp_project_description: "{{ project_description | default('Project created via Ansible') }}"
    ocp_cpu_request: "{{ cpu_request | default('2') }}"
    ocp_memory_request: "{{ memory_request | default('4Gi') }}"
    ocp_cpu_limit: "{{ cpu_limit | default('4') }}"
    ocp_memory_limit: "{{ memory_limit | default('8Gi') }}"

  tasks:

    - name: Create namespace
      redhat.openshift.k8s:
        state: present
        definition:
          apiVersion: v1
          kind: Namespace
          metadata:
            name: "{{ ocp_project_name }}"
            labels:
              managed-by: ansible
              environment: "{{ ocp_environment }}"
          

    - name: Create resource quota
      redhat.openshift.k8s:
        state: present
        definition:
          apiVersion: v1
          kind: ResourceQuota
          metadata:
            name: compute-quota
            namespace: "{{ ocp_project_name }}"
          spec:
            hard:
              requests.cpu: "{{ ocp_cpu_request }}"
              requests.memory: "{{ ocp_memory_request }}"
              limits.cpu: "{{ ocp_cpu_limit }}"
              limits.memory: "{{ ocp_memory_limit }}"

    - name: Create limit range
      redhat.openshift.k8s:
        state: present
        definition:
          apiVersion: v1
          kind: LimitRange
          metadata:
            name: default-limits
            namespace: "{{ ocp_project_name }}"
          spec:
            limits:
              - default:
                  cpu: 500m
                  memory: 512Mi
                defaultRequest:
                  cpu: 200m
                  memory: 256Mi
                type: Container

    - name: Create service account for pipelines
      redhat.openshift.k8s:
        state: present
        definition:
          apiVersion: v1
          kind: ServiceAccount
          metadata:
            name: cicd-sa
            namespace: "{{ ocp_project_name }}"

    - name: Show project bootstrap result
      ansible.builtin.debug:
        msg: "Project {{ ocp_project_name }} created successfully"
